<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT - PENDIDIKAN PANCASILA VII</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Animasi Modal */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-overlay { animation: fadeIn 0.2s ease-out forwards; }
        .modal-content { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- KONFIGURASI ---
        const GOOGLE_SHEETS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzkVR-mDndlpu3V_yRakKU6Pa9uLYeDJAg4WnAEjz7M6er3_mD9hRv52aqw5_FXalA/exec"; // Ganti dengan URL deployment GS Anda
        const STORAGE_KEY = "cbt_PANCASILA_VII";
        const DURATION_MINUTES = 60;

        const questionsData = [
            { id: 1, q: "Apa semboyan negara Indonesia yang melambangkan persatuan dalam keberagaman?", options: ["Tut Wuri Handayani", "Bhinneka Tunggal Ika", "Pancasila Jaya", "Bersatu Kita Teguh"], correct: 1 },
            { id: 2, q: "Burung mitologi yang dijadikan sebagai lambang negara Indonesia adalah...", options: ["Rajawali", "Elang Jawa", "Garuda", "Merpati Putih"], correct: 2 },
            { id: 3, q: "Berapa jumlah agama yang secara resmi diakui oleh pemerintah Indonesia saat ini?", options: ["4 Agama", "5 Agama", "6 Agama", "7 Agama"], correct: 2 },
            { id: 4, q: "Suku Jawa, Sunda, dan Madura merupakan suku-suku besar yang sebagian besar mendiami pulau...", options: ["Sumatera", "Sulawesi", "Kalimantan", "Jawa"], correct: 3 },
            { id: 5, q: "Tempat ibadah yang digunakan oleh umat beragama Hindu di Indonesia disebut...", options: ["Pura", "Vihara", "Klenteng", "Gereja"], correct: 0 },
            { id: 6, q: "Suku Minangkabau yang terkenal dengan tradisi merantau dan rumah gadang berasal dari provinsi...", options: ["Sumatera Utara", "Sumatera Barat", "Riau", "Aceh"], correct: 1 },
            { id: 7, q: "Alat musik tradisional angklung yang terbuat dari bambu merupakan warisan budaya dari daerah...", options: ["Jawa Tengah", "Jawa Timur", "Jawa Barat", "Banten"], correct: 2 },
            { id: 8, q: "Suku Asmat dan Dani adalah salah satu kekayaan keberagaman suku bangsa yang berada di pulau...", options: ["Papua", "Maluku", "Nusa Tenggara", "Bali"], correct: 0 },
            { id: 9, q: "Kitab suci bagi umat yang memeluk agama Buddha adalah...", options: ["Weda", "Al-Qur'an", "Alkitab", "Tripitaka"], correct: 3 },
            { id: 10, q: "Tari Pendet dan Tari Kecak merupakan kesenian tari tradisional yang sangat terkenal dari daerah...", options: ["Sumatra Selatan", "Bali", "Jawa Tengah", "Kalimantan Timur"], correct: 1 },
            { id: 11, q: "Makna filosofis dari semboyan 'Bhinneka Tunggal Ika' adalah...", options: ["Berbeda-beda tetapi tetap satu jua", "Keadilan sosial bagi seluruh rakyat", "Bergotong royong membangun negara", "Bersatu kita teguh bercerai kita runtuh"], correct: 0 },
            { id: 12, q: "Faktor alamiah yang sangat memengaruhi tingginya tingkat keberagaman masyarakat Indonesia adalah...", options: ["Letak geografis di persimpangan jalur perdagangan dunia", "Kesamaan iklim tropis di seluruh Nusantara", "Sistem pemerintahan yang sentralistik di masa lalu", "Mayoritas penduduk bermata pencaharian petani"], correct: 0 },
            { id: 13, q: "Sikap yang menganggap suku bangsa dan kebudayaannya sendiri lebih unggul dan merendahkan kebudayaan suku lain disebut...", options: ["Toleransi", "Chauvinisme", "Etnosentrisme", "Patriotisme"], correct: 2 },
            { id: 14, q: "Keberagaman ras di Indonesia, seperti masuknya ras Kaukasoid dan keturunan Arab, banyak dipengaruhi oleh faktor historis yaitu...", options: ["Perubahan iklim yang drastis di masa lampau", "Kedatangan bangsa asing untuk berdagang dan menyebarkan agama", "Kebijakan kolonial membagi wilayah", "Migrasi penduduk lokal antarpulau"], correct: 1 },
            { id: 15, q: "Perubahan sosial dan budaya di tingkat lokal dewasa ini paling cepat terjadi akibat...", options: ["Kebiasaan masyarakat mempertahankan tradisi lama", "Interaksi intensif dengan teknologi informasi dan budaya luar", "Penutupan akses transportasi ke daerah pedalaman", "Larangan penggunaan bahasa daerah di sekolah"], correct: 1 },
            { id: 16, q: "Dalam konteks kehidupan bermasyarakat, menjaga kerukunan antarumat beragama merupakan wujud pengamalan Pancasila, khususnya sila ke-...", options: ["Pertama", "Kedua", "Ketiga", "Keempat"], correct: 0 },
            { id: 17, q: "Sikap positif dalam menyikapi keberagaman budaya daerah di Indonesia dapat diwujudkan dengan cara...", options: ["Hanya mau mempelajari kesenian dari daerah asalnya saja", "Mengapresiasi dan turut serta melestarikan tarian dari daerah lain", "Merasa malu menggunakan pakaian adat tradisional", "Mengganti semua budaya lokal dengan budaya modern agar terlihat maju"], correct: 1 },
            { id: 18, q: "Frasa 'Bhinneka Tunggal Ika' merupakan kutipan sejarah yang sangat bernilai. Kutipan ini diambil dari sebuah kitab kuno yang berjudul...", options: ["Negarakertagama", "Pararaton", "Sutasoma", "Arjunawiwaha"], correct: 2 },
            { id: 19, q: "Tokoh pujangga besar dari Kerajaan Majapahit yang menulis kitab asal mula kutipan semboyan negara kita adalah...", options: ["Mpu Prapanca", "Mpu Tantular", "Mpu Sedah", "Mpu Panuluh"], correct: 1 },
            { id: 20, q: "Dampak positif utama dari adanya keberagaman sosial budaya bagi bangsa Indonesia adalah...", options: ["Memudahkan timbulnya konflik antar golongan", "Menjadi kekayaan bangsa dan daya tarik pariwisata dunia", "Membuat proses pembuatan undang-undang menjadi lama", "Menghilangkan identitas kedaerahan masing-masing"], correct: 1 },
            { id: 21, q: "Arus globalisasi membawa tantangan tersendiri berupa masuknya budaya asing secara masif. Sikap kritis yang paling sesuai dengan semangat Bhinneka Tunggal Ika dalam menghadapinya adalah...", options: ["Menerima segala inovasi tanpa seleksi agar tidak tertinggal peradaban", "Menutup diri secara total dari budaya global demi kemurnian tradisi", "Melakukan seleksi adaptif; menyerap yang positif dan sejalan dengan nilai Pancasila", "Memaksakan budaya lokal untuk menggantikan budaya global di kancah internasional"], correct: 2 },
            { id: 22, q: "Perubahan sosial dalam masyarakat majemuk dapat memicu disintegrasi bangsa apabila tidak diiringi dengan integrasi sosial. Faktor utama yang berfungsi mencegah disintegrasi tersebut adalah...", options: ["Penyeragaman sistem pemerintahan daerah", "Penguatan sikap toleransi dan konsensus nasional berbasis keadilan", "Pemisahan wilayah permukiman berdasarkan etnis", "Pembatasan ketat terhadap kebebasan pers dan opini publik"], correct: 1 },
            { id: 23, q: "Keberagaman masyarakat Indonesia dapat dikonseptualisasikan sebagai fenomena 'Salad Bowl' daripada 'Melting Pot'. Makna dari konsep tersebut terhadap pelestarian budaya adalah...", options: ["Masyarakat Indonesia telah melebur menjadi satu budaya baru yang homogen secara utuh", "Identitas kultural daerah tetap eksis dan berdampingan secara harmonis membentuk kesatuan negara", "Budaya pendatang lebih mendominasi dan menggeser keberadaan budaya asli", "Masyarakat dipaksa menanggalkan adat istiadatnya demi kepentingan negara"], correct: 1 },
            { id: 24, q: "Dalam stratifikasi sosial, seringkali muncul pengelompokan (antargolongan) berdasarkan status ekonomi. Sikap ber-Bhinneka Tunggal Ika dalam menyikapi kesenjangan antargolongan ini adalah...", options: ["Memberikan keistimewaan hukum khusus bagi golongan kelas atas", "Menumbuhkan kesetiakawanan sosial dan kesetaraan hak tanpa memandang status harta", "Memisahkan fasilitas publik agar tidak terjadi kecemburuan sosial", "Mewajibkan golongan atas membagikan seluruh asetnya kepada negara"], correct: 1 },
            { id: 25, q: "Fenomena 'Cultural Lag' sering terjadi dalam proses perubahan sosial dan budaya bangsa. Hal ini merujuk pada kondisi di mana...", options: ["Terjadi ketertinggalan laju perkembangan budaya non-material dibandingkan budaya material", "Generasi muda secara radikal meninggalkan seluruh budaya leluhur dalam waktu singkat", "Pemerintah gagal melestarikan situs-situs bersejarah di berbagai daerah", "Masyarakat daerah pesisir lebih lambat berkembang dibandingkan masyarakat pegunungan"], correct: 0 },
            { id: 26, q: "Di era digital yang serba cepat, penyebaran hoaks bernuansa SARA sangat rentan mengancam keberagaman bangsa. Upaya preventif strategis yang paling fundamental adalah...", options: ["Melakukan pemblokiran massal terhadap platform media sosial asing", "Meningkatkan literasi digital masyarakat agar kritis mengolah informasi", "Melarang perbincangan tentang agama dan suku di ranah publik", "Memberikan sanksi denda bagi pembuat gawai cerdas"], correct: 1 },
            { id: 27, q: "Tantangan pengaruh perubahan budaya tingkat global antara lain adalah ancaman lunturnya semangat gotong royong yang digantikan oleh sifat...", options: ["Kolektivisme", "Sinkretisme", "Individualisme", "Pluralisme"], correct: 2 },
            { id: 28, q: "Keberagaman ras di Indonesia ditandai dengan sebaran populasi Ras Malayan Mongoloid di wilayah barat dan Ras Melanesoid di wilayah timur. Konsekuensi logis dari keberagaman ini adalah...", options: ["Penghapusan ras lokal untuk membentuk rumpun baru", "Pemberlakuan regulasi yang menolak segala bentuk diskriminasi dan rasisme", "Pembagian hak kewarganegaraan secara proporsional berdasar jumlah populasi ras", "Larangan dilakukannya pernikahan silang antar ras"], correct: 1 },
            { id: 29, q: "Faktor demografi (kependudukan) seperti migrasi dan urbanisasi mendorong perubahan sosial masyarakat perkotaan. Hubungan positif antara migrasi dan kebinekaan adalah...", options: ["Menyebabkan terjadinya akulturasi budaya yang memperkaya mozaik budaya daerah tujuan", "Menurunkan tingkat perekonomian penduduk lokal secara signifikan", "Mempercepat kepunahan bahasa daerah karena tidak lagi digunakan di kota", "Memicu sentralisasi kekuasaan budaya pada satu kelompok etnis dominan"], correct: 0 },
            { id: 30, q: "Aktualisasi sejati dari semboyan Bhinneka Tunggal Ika dalam perumusan peraturan daerah (Perda) mengharuskan pemerintah untuk...", options: ["Menyusun peraturan yang hanya berpihak pada kelompok mayoritas", "Mengadopsi hukum adat setempat bagi warga asing", "Membuat regulasi yang mengakomodasi kepentingan bersama serta melindungi hak minoritas", "Menyamaratakan seluruh kebijakan daerah tanpa memandang kekhususan lokal"], correct: 2 }
        ];

        // --- UTILS ---
        const shuffleArray = (array) => {
            let newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const prepareQuestions = () => {
            return shuffleArray(questionsData).map(item => {
                const originalCorrectOption = item.options[item.correct];
                const shuffledOptions = shuffleArray(item.options);
                return {
                    ...item,
                    options: shuffledOptions,
                    correctIndex: shuffledOptions.indexOf(originalCorrectOption)
                };
            });
        };

        // --- MAIN COMPONENT ---
        function App() {
            const [view, setView] = useState('login'); // login, resume, exam, result
            const [student, setStudent] = useState({ name: '', class: '', date: new Date().toISOString().split('T')[0] });
            const [questions, setQuestions] = useState([]);
            const [answers, setAnswers] = useState({});
            const [currentIndex, setCurrentIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState(DURATION_MINUTES * 60);
            const [violations, setViolations] = useState(0);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [finalScore, setFinalScore] = useState(null);

            // Modal States
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [alertData, setAlertData] = useState({ show: false, message: '', isCritical: false });

            // Init Lucide
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // Resume Session Check
            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) setView('resume');
            }, []);

            // Security: Anti Cheat
            useEffect(() => {
                // Hanya jalankan pemantauan saat sedang di halaman ujian
                if (view !== 'exam') return;

                const handleViolation = () => {
                    setViolations(prev => {
                        const next = prev + 1;
                        if (next >= 2) {
                            setAlertData({
                                show: true,
                                message: "Anda telah melanggar aturan ujian sebanyak 2 kali. Ujian dihentikan dan jawaban dikirim otomatis.",
                                isCritical: true
                            });
                            // Beri waktu sejenak agar siswa bisa membaca peringatan sebelum disubmit
                            setTimeout(() => handleSubmit(), 4000);
                        } else {
                            setAlertData({
                                show: true,
                                message: "PERINGATAN! Anda terdeteksi keluar dari layar ujian. Jangan keluar dari mode fullscreen atau memindahkan tab. Pelanggaran berikutnya akan otomatis menghentikan ujian.",
                                isCritical: false
                            });
                        }
                        return next;
                    });
                };

                const onVisibilityChange = () => { if (document.visibilityState === 'hidden') handleViolation(); };
                const onFullscreenChange = () => { if (!document.fullscreenElement) handleViolation(); };

                document.addEventListener('visibilitychange', onVisibilityChange);
                document.addEventListener('fullscreenchange', onFullscreenChange);
                return () => {
                    document.removeEventListener('visibilitychange', onVisibilityChange);
                    document.removeEventListener('fullscreenchange', onFullscreenChange);
                };
            }, [view]);

            // Timer & Auto Save
            useEffect(() => {
                if (view !== 'exam') return;
                if (timeLeft <= 0) { 
                    setAlertData({ show: true, message: "Waktu ujian telah habis! Jawaban Anda sedang dikirim otomatis.", isCritical: true });
                    setTimeout(() => handleSubmit(), 3000);
                    return; 
                }

                const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                
                // Auto Save Every 5s
                const saver = setInterval(() => {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ student, questions, answers, timeLeft, currentIndex, violations }));
                }, 5000);

                return () => { clearInterval(timer); clearInterval(saver); };
            }, [view, timeLeft, answers, currentIndex]);

            const startExam = (isNew = true) => {
                if (isNew) {
                    if (!student.name || !student.class) {
                        return setAlertData({ show: true, message: "Mohon isi Nama Lengkap dan Kelas terlebih dahulu!", isCritical: false });
                    }
                    setQuestions(prepareQuestions());
                    setAnswers({});
                    setTimeLeft(DURATION_MINUTES * 60);
                    setViolations(0);
                    setCurrentIndex(0);
                } else {
                    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                    setStudent(saved.student);
                    setQuestions(saved.questions);
                    setAnswers(saved.answers);
                    setTimeLeft(saved.timeLeft);
                    setViolations(saved.violations);
                    setCurrentIndex(saved.currentIndex);
                }
                
                document.documentElement.requestFullscreen().catch(() => {
                    console.log("Browser block fullscreen request");
                });
                setView('exam');
            };

            const handleSubmit = async () => {
                if (isSubmitting) return;
                setIsSubmitting(true);
                setShowConfirmModal(false); // Tutup modal jika masih terbuka

                // Calculate Score
                let correctCount = 0;
                questions.forEach((q, idx) => {
                    if (answers[idx] === q.correctIndex) correctCount++;
                });
                const score = questions.length > 0 ? Math.round((correctCount / questions.length) * 100) : 0;
                setFinalScore(score);

                const payload = {
                    nama: student.name,
                    kelas: student.class,
                    tanggal: student.date,
                    skor: score,
                    pelanggaran: violations,
                    keterangan: timeLeft <= 0 ? "Waktu Habis" : (violations >= 2 ? "Diskualifikasi" : "Selesai Normal")
                };

                try {
                    await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                } catch (e) { console.error("Submit Error", e); }

                localStorage.removeItem(STORAGE_KEY);
                if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
                setAlertData({ show: false, message: '', isCritical: false }); // Reset alert
                setView('result');
                setIsSubmitting(false);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            // MODAL RENDER FUNCTIONS
            // Menggunakan fungsi pemanggil langsung (Bukan deklarasi Komponen) 
            // agar React tidak melakukan Unmount berulang akibat timer.
            const renderAlertModal = () => (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 backdrop-blur-sm p-4 modal-overlay">
                    <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl modal-content border-t-4 border-red-500">
                        <div className="flex items-center justify-center w-16 h-16 bg-red-100 text-red-600 rounded-full mx-auto mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                        </div>
                        <h3 className="text-xl font-bold text-center text-gray-800 mb-3">Pemberitahuan Sistem</h3>
                        <p className="text-center text-gray-600 mb-6 font-medium leading-relaxed">
                            {alertData.message}
                        </p>
                        {!alertData.isCritical && (
                            <button onClick={() => setAlertData({ show: false, message: '', isCritical: false })} 
                                className="w-full py-3 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 transition-colors shadow-lg shadow-red-200">
                                Mengerti
                            </button>
                        )}
                        {alertData.isCritical && (
                            <div className="w-full py-3 flex justify-center items-center gap-2 text-red-600 font-bold bg-red-50 rounded-xl">
                                <div className="w-5 h-5 border-2 border-red-600 border-t-transparent rounded-full animate-spin"></div>
                                Memproses...
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderConfirmModal = () => (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 backdrop-blur-sm p-4 modal-overlay">
                    <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl modal-content">
                        <div className="flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-full mx-auto mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                              <path strokeLinecap="round" strokeLinejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <h3 className="text-xl font-bold text-center text-gray-800 mb-2">Selesai Ujian?</h3>
                        <p className="text-center text-gray-600 mb-6 text-sm">
                            Sisa waktu Anda <b>{formatTime(timeLeft)}</b>. <br/>
                            Pastikan semua soal telah terjawab. Anda tidak dapat mengubah jawaban setelah dikirim.
                        </p>
                        <div className="flex gap-3">
                            <button onClick={() => setShowConfirmModal(false)} 
                                className="flex-1 py-3 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 transition-colors">
                                Periksa Lagi
                            </button>
                            <button onClick={handleSubmit} 
                                className="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200">
                                Ya, Kumpulkan
                            </button>
                        </div>
                    </div>
                </div>
            );


            // --- VIEWS ---
            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-blue-600 to-indigo-800">
                    {alertData.show && renderAlertModal()}
                    <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="book-open" className="text-blue-600 w-8 h-8"></i>
                            </div>
                            <h1 className="text-2xl font-bold text-gray-800 uppercase">Ujian Pendidikan Pancasila</h1>
                            <p className="text-gray-500 text-sm">Bab 4: Keberagaman Bangsa - Kelas VII</p>
                        </div>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold mb-1">Nama Lengkap</label>
                                <input type="text" className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                                    placeholder="Masukkan nama..." value={student.name} onChange={e => setStudent({...student, name: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold mb-1">Kelas</label>
                                <input type="text" className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                                    placeholder="Contoh: VII-A" value={student.class} onChange={e => setStudent({...student, class: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold mb-1">Tanggal Ujian</label>
                                <input type="date" className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                                    value={student.date} onChange={e => setStudent({...student, date: e.target.value})} />
                            </div>
                            <button onClick={() => startExam(true)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                                MULAI UJIAN
                            </button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'resume') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gray-100">
                    <div className="bg-white p-8 rounded-xl shadow-xl max-w-md text-center">
                        <i data-lucide="history" className="w-16 h-16 text-yellow-500 mx-auto mb-4"></i>
                        <h2 className="text-xl font-bold mb-2">Sesi Ujian Tersimpan Ditemukan!</h2>
                        <p className="text-gray-600 mb-6">Kami menemukan progres ujian terakhir Anda. Ingin melanjutkan atau mengulang dari awal?</p>
                        <div className="flex gap-4">
                            <button onClick={() => { localStorage.removeItem(STORAGE_KEY); setView('login'); }} className="flex-1 px-4 py-3 border rounded-xl hover:bg-gray-50 font-bold text-gray-600">Hapus Data</button>
                            <button onClick={() => startExam(false)} className="flex-1 px-4 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-bold shadow-lg shadow-blue-200">Lanjutkan</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'exam') return (
                <div className="min-h-screen flex flex-col md:flex-row relative">
                    {alertData.show && renderAlertModal()}
                    {showConfirmModal && renderConfirmModal()}
                    
                    {/* Main Area */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="bg-white border-b px-6 py-4 flex justify-between items-center shrink-0 shadow-sm z-10">
                            <div>
                                <span className="text-xs font-bold text-blue-600 block uppercase tracking-wider">Pendidikan Pancasila VII</span>
                                <h2 className="font-bold text-gray-800 text-lg">Soal No. {currentIndex + 1}</h2>
                            </div>
                            <div className={`px-4 py-2 rounded-lg font-mono font-bold text-xl flex items-center gap-2 ${timeLeft < 300 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-gray-100 text-gray-700'}`}>
                                <i data-lucide="clock" className="w-5 h-5"></i> {formatTime(timeLeft)}
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-4 md:p-8 no-scrollbar bg-gray-50/50">
                            <div className="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border p-6 md:p-8">
                                <p className="text-lg md:text-xl text-gray-800 leading-relaxed mb-8">{questions[currentIndex].q}</p>
                                
                                <div className="space-y-3">
                                    {questions[currentIndex].options.map((opt, i) => (
                                        <label key={i} className={`flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all ${answers[currentIndex] === i ? 'border-blue-500 bg-blue-50' : 'border-gray-100 hover:border-gray-300'}`}>
                                            <input type="radio" name="option" className="hidden" checked={answers[currentIndex] === i} 
                                                onChange={() => setAnswers({...answers, [currentIndex]: i})} />
                                            <div className={`w-7 h-7 rounded-full border-2 mr-4 flex items-center justify-center shrink-0 font-bold ${answers[currentIndex] === i ? 'border-blue-500 bg-blue-500 text-white' : 'border-gray-300 text-gray-500'}`}>
                                                {String.fromCharCode(65 + i)}
                                            </div>
                                            <span className="text-gray-700 md:text-lg">{opt}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                        </main>

                        <footer className="bg-white border-t p-4 flex justify-between items-center shrink-0">
                            <button disabled={currentIndex === 0} onClick={() => setCurrentIndex(c => c - 1)} className="px-6 py-3 rounded-xl bg-gray-100 text-gray-600 disabled:opacity-50 font-bold flex items-center hover:bg-gray-200">
                                <i data-lucide="chevron-left" className="w-5 h-5 mr-1"></i> Sebelumnya
                            </button>
                            <div className="flex gap-2">
                                {currentIndex === questions.length - 1 ? (
                                    <button onClick={() => setShowConfirmModal(true)} className="px-8 py-3 rounded-xl bg-green-600 text-white font-bold hover:bg-green-700 shadow-lg shadow-green-200 flex items-center">
                                        SUBMIT <i data-lucide="check" className="w-5 h-5 ml-2"></i>
                                    </button>
                                ) : (
                                    <button onClick={() => setCurrentIndex(c => c + 1)} className="px-8 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 flex items-center">
                                        Selanjutnya <i data-lucide="chevron-right" className="w-5 h-5 ml-1"></i>
                                    </button>
                                )}
                            </div>
                        </footer>
                    </div>

                    {/* Navigation Sidebar */}
                    <div className="w-full md:w-80 bg-white border-l flex flex-col h-screen overflow-hidden shrink-0 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)]">
                        <div className="p-5 border-b bg-gray-50 flex items-center justify-between">
                            <div>
                                <h3 className="font-bold text-gray-800">Navigasi Soal</h3>
                                <p className="text-xs text-gray-500 mt-1 font-medium">Total {questions.length} Soal</p>
                            </div>
                            <div className="bg-blue-100 text-blue-600 text-xs font-bold px-3 py-1 rounded-full">
                                {Object.keys(answers).length} Terjawab
                            </div>
                        </div>
                        <div className="p-5 grid grid-cols-5 gap-3 overflow-y-auto content-start">
                            {questions.map((_, i) => (
                                <button key={i} onClick={() => setCurrentIndex(i)} className={`h-11 rounded-lg text-sm font-bold transition-all shadow-sm
                                    ${currentIndex === i ? 'ring-2 ring-blue-500 ring-offset-2 scale-110' : ''}
                                    ${answers[i] !== undefined ? 'bg-blue-600 text-white border-transparent' : 'bg-white border-2 border-gray-200 text-gray-400 hover:border-gray-300'}
                                `}>
                                    {i + 1}
                                </button>
                            ))}
                        </div>
                        <div className="mt-auto p-5 border-t bg-gray-50">
                            <div className="flex items-center text-sm text-gray-700 mb-3 font-semibold bg-white p-3 border rounded-lg">
                                <i data-lucide="user" className="w-5 h-5 mr-3 text-blue-600"></i> {student.name} <span className="ml-auto text-xs text-gray-400">{student.class}</span>
                            </div>
                            <div className={`flex items-center text-sm font-bold p-3 border rounded-lg ${violations > 0 ? 'bg-red-50 text-red-600 border-red-200' : 'bg-green-50 text-green-600 border-green-200'}`}>
                                <i data-lucide="shield-alert" className="w-5 h-5 mr-3"></i> Pelanggaran: {violations}/2
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (view === 'result') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gray-100">
                    <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full text-center">
                        <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="check-circle" className="w-12 h-12 text-green-600"></i>
                        </div>
                        <h1 className="text-3xl font-bold text-gray-800 mb-2">Ujian Selesai!</h1>
                        <p className="text-gray-600 mb-8">Terima kasih telah mengerjakan ujian dengan tertib.</p>
                        
                        <div className="bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100 rounded-2xl p-8 mb-8">
                            <div className="text-sm text-blue-600 font-bold uppercase tracking-widest mb-2">Nilai Akhir</div>
                            <div className="text-6xl font-black text-blue-600 drop-shadow-sm">{finalScore}</div>
                        </div>

                        <div className="text-left text-sm text-gray-600 space-y-3 bg-gray-50 p-6 rounded-xl">
                            <div className="flex justify-between border-b border-gray-200 pb-2"><span>Nama:</span><span className="font-bold text-gray-800">{student.name}</span></div>
                            <div className="flex justify-between border-b border-gray-200 pb-2"><span>Kelas:</span><span className="font-bold text-gray-800">{student.class}</span></div>
                            <div className="flex justify-between"><span>Pelanggaran:</span><span className={`font-bold ${violations > 0 ? 'text-red-500' : 'text-green-500'}`}>{violations} Kali</span></div>
                        </div>
                        <button onClick={() => window.location.reload()} className="mt-8 w-full py-4 bg-gray-800 hover:bg-gray-900 transition-colors text-white rounded-xl font-bold shadow-xl">
                            KEMBALI KE BERANDA
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
